name: Test action 

on: [push]

jobs:
  test-action:
    runs-on: ubuntu-latest
    permissions:
      actions: write # to be able to call another action in the repo
      contents: read # required for actions/checkout in dispatched workflow
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Trigger workflow that has inputs to hide. Wait for result.
      uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 # v1
      id: test-action
      with:
        workflow: run-action-via-dispatch.yml
        ref: ${{ github.ref_name }} # run the workflow from the current branch to test the present state of the code 
        wait-for-completion: true 
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Assert log contents
      run: node scripts/assert-logs.js
      env:
        RUN_URL: ${{ steps.test-action.outputs.runUrl }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}